<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصر 2030 - الرؤية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link href="/libs/all.min.css" rel="stylesheet">
    <link href="/css/fonts.css" rel="stylesheet">
    <script defer src="/libs/all.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: body-fade-in 0.5s ease-out forwards;
        }
        
        @keyframes body-fade-in {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        .slide-container {
            width: 100vw;
            height: 100vh;
            background-color: #0a0f1c;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 1;
            opacity: 0;
            animation: slide-entrance 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.3s;
        }
        
        @keyframes slide-entrance {
            0% {
                opacity: 0;
                transform: scale(0.95) rotateX(5deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateX(0deg);
            }
        }
        
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            z-index: 0;
            transform: scale(0.8);
        }
        
        .blob-1 {
            width: 40vmax;
            height: 40vmax;
            background-color: #00eaff;
            top: -10vmax;
            right: -10vmax;
            animation: blob-enter-1 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.5s, pulse-glow 8s infinite alternate 2s;
        }
        
        .blob-2 {
            width: 50vmax;
            height: 50vmax;
            background-color: #6a5cff;
            bottom: -15vmax;
            left: -10vmax;
            animation: blob-enter-2 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.7s, pulse-glow 8s infinite alternate 2.5s;
        }
        
        .blob-3 {
            width: 25vmax;
            height: 25vmax;
            background-color: #00ff9d;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(60px);
            animation: blob-enter-3 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.9s, pulse-glow 8s infinite alternate 3s;
        }
        
        @keyframes blob-enter-1 {
            0% {
                opacity: 0;
                transform: translateX(50px) translateY(-50px) scale(0.5);
            }
            100% {
                opacity: 0.6;
                transform: translateX(0) translateY(0) scale(1);
            }
        }
        
        @keyframes blob-enter-2 {
            0% {
                opacity: 0;
                transform: translateX(-50px) translateY(50px) scale(0.5);
            }
            100% {
                opacity: 0.6;
                transform: translateX(0) translateY(0) scale(1);
            }
        }
        
        @keyframes blob-enter-3 {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
            }
            100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        .scene-3d {
            position: absolute;
            width: 100%;
            height: 100%;
            perspective: 100vmax;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            animation: scene-appear 0.8s ease-out forwards 1s;
        }
        
        @keyframes scene-appear {
            0% {
                opacity: 0;
                transform: translateZ(-100px);
            }
            100% {
                opacity: 1;
                transform: translateZ(0);
            }
        }
        
        .hero-content {
            text-align: center;
            transform-style: preserve-3d;
            z-index: 20;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            perspective: 1000px;
        }
        
        .main-title {
            font-size: clamp(3rem, 10vmin, 6rem);
            font-weight: 900;
            color: #ffffff;
            line-height: 1.1;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 2vmin;
            opacity: 0;
            transform: translateY(80px) translateZ(-100px) rotateX(20deg);
            animation: title-entrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1.2) forwards 1.2s;
        }
        
        @keyframes title-entrance {
            0% {
                opacity: 0;
                transform: translateY(80px) translateZ(-100px) rotateX(20deg);
                filter: blur(10px);
            }
            60% {
                opacity: 0.8;
                filter: blur(5px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateZ(50px) rotateX(0);
                filter: blur(0);
            }
        }
        
        .subtitle {
            font-size: clamp(1.5rem, 5vmin, 2.5rem);
            color: #e0faff;
            font-weight: 500;
            opacity: 0;
            transform: translateY(40px) translateZ(-50px);
            animation: subtitle-entrance 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 1.8s;
            background-color: rgba(0, 234, 255, 0.1);
            padding: 2vmin 5vmin;
            border-radius: 50px;
            border: 1px solid rgba(0, 234, 255, 0.2);
            backdrop-filter: blur(5px);
            display: inline-block;
            margin-top: 2vmin;
            box-shadow: 0 10px 20px rgba(0, 234, 255, 0.2);
        }
        
        @keyframes subtitle-entrance {
            0% {
                opacity: 0;
                transform: translateY(40px) translateZ(-50px);
                filter: blur(5px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateZ(30px);
                filter: blur(0);
            }
        }
        
        .badge {
            display: inline-block;
            color: #00eaff;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: clamp(0.8rem, 2vmin, 1rem);
            background-color: rgba(0, 234, 255, 0.15);
            padding: 1vmin 3vmin;
            border-radius: 50px;
            border: 1px solid rgba(0, 234, 255, 0.4);
            backdrop-filter: blur(5px);
            margin-bottom: 4vmin;
            opacity: 0;
            transform: translateY(-20px) scale(0.9);
            animation: badge-pop 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards 1.5s;
        }
        
        @keyframes badge-pop {
            0% {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
            70% {
                transform: translateY(5px) scale(1.05);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .card-3d {
            position: absolute;
            width: clamp(100px, 20vmin, 200px);
            height: clamp(100px, 20vmin, 200px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 234, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: clamp(15px, 4vmin, 30px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 15;
            opacity: 0;
        }
        
        .card-vision {
            top: 15%;
            left: 10%;
            animation: card-float-enter-1 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 1s, float-card-1 6s ease-in-out infinite 2s;
            transform: translateZ(20px) rotateY(15deg) rotateX(10deg);
        }
        
        .card-digital {
            bottom: 20%;
            right: 10%;
            animation: card-float-enter-2 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 1.2s, float-card-2 7s ease-in-out infinite 2.2s;
            transform: translateZ(-20px) rotateY(-15deg) rotateX(5deg);
        }
        
        .card-ai {
            top: 25%;
            right: 15%;
            width: clamp(80px, 15vmin, 150px);
            height: clamp(80px, 15vmin, 150px);
            animation: card-float-enter-3 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 1.4s, float-card-3 8s ease-in-out infinite 2.4s;
            transform: translateZ(0px) rotateY(-5deg) rotateX(15deg);
        }
        
        @keyframes card-float-enter-1 {
            0% {
                opacity: 0;
                transform: translateX(-100px) translateY(-50px) translateZ(20px) rotateY(45deg) rotateX(30deg) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translateX(0) translateY(0) translateZ(20px) rotateY(15deg) rotateX(10deg) scale(1);
            }
        }
        
        @keyframes card-float-enter-2 {
            0% {
                opacity: 0;
                transform: translateX(100px) translateY(50px) translateZ(-20px) rotateY(-45deg) rotateX(-30deg) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translateX(0) translateY(0) translateZ(-20px) rotateY(-15deg) rotateX(5deg) scale(1);
            }
        }
        
        @keyframes card-float-enter-3 {
            0% {
                opacity: 0;
                transform: translateX(50px) translateY(-30px) translateZ(0) rotateY(20deg) rotateX(40deg) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translateX(0) translateY(0) translateZ(0) rotateY(-5deg) rotateX(15deg) scale(1);
            }
        }
        
        .card-3d:hover {
            transform: translateZ(40px) scale(1.1) rotateY(5deg) rotateX(5deg);
            background: rgba(0, 234, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 234, 255, 0.3), 0 0 30px rgba(0, 234, 255, 0.4);
            border-color: rgba(0, 234, 255, 0.5);
        }
        
        .icon-glow {
            font-size: clamp(2rem, 6vmin, 4rem);
            margin-bottom: 2vmin;
            filter: drop-shadow(0 0 15px rgba(0, 234, 255, 0.4));
            transform: translateZ(30px);
            transition: all 0.3s ease;
        }
        
        .card-3d:hover .icon-glow {
            filter: drop-shadow(0 0 25px rgba(0, 234, 255, 0.8));
            transform: translateZ(50px) scale(1.1);
        }
        
        .card-label {
            color: white;
            font-size: clamp(0.8rem, 2vmin, 1.2rem);
            font-weight: 700;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            text-align: center;
            padding: 0 1vmin;
            transform: translateZ(20px);
            transition: all 0.3s ease;
        }
        
        .card-3d:hover .card-label {
            transform: translateZ(30px);
            color: #00eaff;
        }
        
        .grid-floor {
            position: absolute;
            bottom: -30vh;
            left: -50%;
            width: 200%;
            height: 70vh;
            background-image: linear-gradient(rgba(0, 234, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 234, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(70deg);
            z-index: 1;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 80%);
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 80%);
            animation: grid-move 20s linear infinite;
            opacity: 0;
            animation: grid-appear 1.5s ease-out forwards 0.5s, grid-move 20s linear infinite 2s;
        }
        
        @keyframes grid-appear {
            0% {
                opacity: 0;
                transform: rotateX(70deg) translateY(100px);
            }
            100% {
                opacity: 1;
                transform: rotateX(70deg) translateY(0);
            }
        }
        
        .decoration-ring {
            position: absolute;
            border: 2px dashed rgba(0, 234, 255, 0.1);
            border-radius: 50%;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
        }
        
        .ring-1 {
            width: 80vmin;
            height: 80vmin;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: ring-appear-1 1s ease-out forwards 0.8s, spin-slow 60s linear infinite 2s;
        }
        
        .ring-2 {
            width: 110vmin;
            height: 110vmin;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.05;
            animation: ring-appear-2 1s ease-out forwards 1s, spin-slow 80s linear infinite reverse 2.2s;
        }
        
        @keyframes ring-appear-1 {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        @keyframes ring-appear-2 {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
            }
            100% {
                opacity: 0.05;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        .footer {
            position: absolute;
            bottom: 4vmin;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 5vmin;
            z-index: 50;
            color: rgba(224, 250, 255, 0.8);
            font-size: clamp(0.7rem, 2vmin, 1rem);
            flex-wrap: wrap;
            gap: 2vmin;
        }
        
        .footer-item {
            display: flex;
            align-items: center;
            gap: 1vmin;
            background: rgba(0, 234, 255, 0.1);
            padding: 1.5vmin 3vmin;
            border-radius: 25px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 234, 255, 0.2);
            white-space: nowrap;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .footer-item:nth-child(1) {
            animation: footer-item-enter 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 2s;
        }
        
        .footer-item:nth-child(2) {
            animation: footer-item-enter 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 2.2s;
        }
        
        @keyframes footer-item-enter {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(0, 234, 255, 0.7);
            border-radius: 50%;
            animation: particle-float 4s ease-in infinite;
        }
        
        @keyframes particle-float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(20px);
                opacity: 0;
            }
        }
        
        .access-button {
            position: absolute;
            bottom: 15vmin;
            left: 50%;
            transform: translateX(-50%) translateZ(30px);
            z-index: 25;
            opacity: 0;
            animation: button-appear 1s ease-out forwards 2.5s;
        }
        
        .access-btn {
            background: linear-gradient(135deg, #00eaff, #6a5cff);
            color: #0a0f1c;
            border: none;
            padding: 1.5vmin 5vmin;
            font-size: clamp(1rem, 3vmin, 1.5rem);
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 234, 255, 0.4);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .access-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 234, 255, 0.6);
            background: linear-gradient(135deg, #6a5cff, #00eaff);
        }
        
        @keyframes button-appear {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(30px) translateZ(30px);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0) translateZ(30px);
            }
        }
        
        @media (max-width: 768px) {
            .card-vision { left: 5%; top: 10%; }
            .card-digital { right: 5%; bottom: 15%; }
            .card-ai { right: 10%; top: 15%; }
            .footer { justify-content: center; gap: 3vmin; }
            .access-button { bottom: 12vmin; }
        }
        
        @keyframes float-card-1 {
            0%,100% { transform: translate3d(0,0,20px) rotateY(15deg) rotateX(10deg); }
            50% { transform: translate3d(0,-20px,20px) rotateY(10deg) rotateX(5deg); }
        }
        
        @keyframes float-card-2 {
            0%,100% { transform: translate3d(0,0,-20px) rotateY(-15deg) rotateX(5deg); }
            50% { transform: translate3d(0,-25px,-20px) rotateY(-10deg) rotateX(10deg); }
        }
        
        @keyframes float-card-3 {
            0%,100% { transform: translate3d(0,0,0) rotateY(-5deg) rotateX(15deg); }
            50% { transform: translate3d(0,-15px,0) rotateY(0deg) rotateX(10deg); }
        }
        
        @keyframes pulse-glow {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.1); }
        }
        
        @keyframes grid-move {
            0% { transform: rotateX(70deg) translateY(0); }
            100% { transform: rotateX(70deg) translateY(50px); }
        }
        
        @keyframes spin-slow {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
    </head>

    <body>
        <div class="particles" id="particles"></div>

        <div class="slide-container">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="grid-floor"></div>
            <div class="decoration-ring ring-1"></div>
            <div class="decoration-ring ring-2"></div>

            <div class="scene-3d">
                <div class="card-3d card-vision">
                    <i class="fas fa-eye icon-glow text-cyan-400"></i>
                    <p class="card-label">رؤية 2030</p>
                </div>

                <div class="hero-content">
                    <div class="badge">مصر المستقبل</div>
                    <h1 class="main-title">
                        مصر 2030<br>
                        <span class="title-highlight" style="color: #00eaff; text-shadow: 0 0 20px rgba(0,234,255,0.5);">الجمهورية الجديدة</span>
                    </h1>
                    <p class="subtitle">منصة متكاملة للتحول الرقمي والتنمية المستدامة</p>
                </div>

                <div class="card-3d card-digital">
                    <i class="fas fa-laptop icon-glow text-green-400"></i>
                    <p class="card-label">التحول الرقمي</p>
                </div>

                <div class="card-3d card-ai">
                    <i class="fas fa-brain icon-glow text-purple-400"></i>
                    <p class="card-label">الذكاء الاصطناعي</p>
                </div>

                <div class="access-button">
                    <button class="access-btn" onclick="parent.next()">
                        <i class="fas fa-terminal"></i> ابدأ الرحلة
                    </button>
                </div>
            </div>

            <div class="footer">
                <div class="footer-item">
                    <i class="fas fa-rocket"></i>
                    <span>رؤية 2030</span>
                </div>
                <div class="footer-item">
                    <span>تحول رقمي شامل</span>
                    <i class="fas fa-bolt text-yellow-400"></i>
                </div>
                <div class="footer-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>مستقبل مستدام</span>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                createParticles();

                document.addEventListener('touchstart', function(event) {
                    if (event.touches.length > 1) event.preventDefault();
                }, { passive: false });

                let lastTouchEnd = 0;
                document.addEventListener('touchend', function(event) {
                    const now = (new Date()).getTime();
                    if (now - lastTouchEnd <= 300) event.preventDefault();
                    lastTouchEnd = now;
                }, false);

                document.addEventListener('contextmenu', function(event) {
                    event.preventDefault();
                });

                // تفاعل الكروت
                document.querySelectorAll('.card-3d').forEach(card => {
                    card.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const icon = this.querySelector('.icon-glow');
                        const label = this.querySelector('.card-label');
                        
                        this.style.transform += ' rotateY(180deg)';
                        icon.style.transform += ' rotateY(-180deg) scale(1.2)';
                        label.style.transform += ' rotateY(-180deg) translateZ(40px)';

                        setTimeout(() => {
                            this.style.transform = this.style.transform.replace(' rotateY(180deg)', '');
                            icon.style.transform = icon.style.transform.replace(' rotateY(-180deg) scale(1.2)', '');
                            label.style.transform = label.style.transform.replace(' rotateY(-180deg) translateZ(40px)', '');
                        }, 600);
                    });

                    card.addEventListener('mouseenter', function() {
                        const ripple = document.createElement('div');
                        ripple.style.position = 'absolute';
                        ripple.style.width = '100%';
                        ripple.style.height = '100%';
                        ripple.style.background = 'radial-gradient(circle at center, rgba(0,234,255,0.2) 0%, transparent 70%)';
                        ripple.style.borderRadius = 'inherit';
                        ripple.style.zIndex = '-1';
                        ripple.style.animation = 'ripple-effect 0.6s ease-out';
                        this.appendChild(ripple);

                        setTimeout(() => {
                            if (ripple.parentNode === this) this.removeChild(ripple);
                        }, 600);
                    });
                });

                const style = document.createElement('style');
                style.textContent = `
                    @keyframes ripple-effect {
                        0% { transform: scale(0.8); opacity: 1; }
                        100% { transform: scale(2); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            });

            function createParticles() {
                const particlesContainer = document.getElementById('particles');
                const particleCount = 40;

                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';

                    const left = Math.random() * 100;
                    const delay = Math.random() * 2;
                    const duration = 3 + Math.random() * 3;
                    const size = 2 + Math.random() * 3;

                    particle.style.left = `${left}%`;
                    particle.style.animationDelay = `${delay}s`;
                    particle.style.animationDuration = `${duration}s`;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;

                    const colors = ['#00eaff', '#6a5cff', '#00ff9d'];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.background = color;

                    particlesContainer.appendChild(particle);
                }
            }
        </script>
    </body>

</html>
